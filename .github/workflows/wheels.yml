name: build_wheels

on:
  schedule: # Run weekly on Friday
    - cron: '0 5 * * 5'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel for cp${{ matrix.cibw_python }}-${{ matrix.wheel_suffix || matrix.platform_id }}
    runs-on: ${{ matrix.os }}
    env:
      # Note: wheel_suffix is used to disambiguate output for cases where we build multiple wheels on the same
      # platform and Python version. Currently, this is only done for Linux. It does not change output wheel names,
      # which are determined by cibuildwheel based on the platform and Python version.
      WHEEL_SUFFIX: ${{ matrix.wheel_suffix || matrix.platform_id }}
      # This is the python version that runs cibuildwheel, not the target for which wheels are built
      # The target version is set in the matrix.
      CIBW_HOST_PYTHON: '3.13'
      CIBW_DEFAULT_MANYLINUX_IMAGE: manylinux_2_28
    strategy:
      fail-fast: false
      matrix:
        include:
          # cibuildwheel runs on Python 3.13, but each wheel is tested with
          # the matching target Python version.
          # Need to quote decimal versions as string to avoid the "Norway problem"

          # Windows 64-bit
          - os: windows-latest
            python: '3.10'
            cibw_python: 310
            platform_id: win_amd64
          - os: windows-latest
            python: '3.11'
            cibw_python: 311
            platform_id: win_amd64
          - os: windows-latest
            python: '3.12'
            cibw_python: 312
            platform_id: win_amd64
          - os: windows-latest
            python: '3.13'
            cibw_python: 313
            platform_id: win_amd64

          # Linux 64-bit
          - os: ubuntu-latest
            python: '3.10'
            cibw_python: 310
            platform_id: manylinux_x86_64
            # only needed if different from CIBW_DEFAULT_MANYLINUX_IMAGE
            manylinux_image: manylinux2014
            # only needed if we need to disambiguate output for multiple wheels on the same platform and Python version
            wheel_suffix: manylinux2014_x86_64
          - os: ubuntu-latest
            python: '3.10'
            cibw_python: 310
            platform_id: manylinux_x86_64
            wheel_suffix: manylinux_2_28_x86_64
          - os: ubuntu-latest
            python: '3.11'
            cibw_python: 311
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: '3.12'
            cibw_python: 312
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: '3.13'
            cibw_python: 313
            platform_id: manylinux_x86_64

          # macOS on Intel 64-bit
          - os: macos-15-intel
            python: '3.10'
            cibw_python: 310
            arch: x86_64
            platform_id: macosx_x86_64
          - os: macos-15-intel
            python: '3.11'
            cibw_python: 311
            arch: x86_64
            platform_id: macosx_x86_64
          - os: macos-15-intel
            python: '3.12'
            cibw_python: 312
            arch: x86_64
            platform_id: macosx_x86_64
          - os: macos-15-intel
            python: '3.13'
            cibw_python: 313
            arch: x86_64
            platform_id: macosx_x86_64


          # macOS on Apple M1 64-bit, supported for Python 3.10 and later
          - os: macos-14
            python: '3.10'
            cibw_python: 310
            arch: arm64
            platform_id: macosx_arm64
          - os: macos-14
            python: '3.11'
            cibw_python: 311
            arch: arm64
            platform_id: macosx_arm64
          - os: macos-14
            python: '3.12'
            cibw_python: 312
            arch: arm64
            platform_id: macosx_arm64
          - os: macos-14
            python: '3.13'
            cibw_python: 313
            arch: arm64
            platform_id: macosx_arm64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-python@v6
        name: Install Python host for cibuildwheel
        with:
          python-version: ${{ env.CIBW_HOST_PYTHON }}

        # Visual Studio
      - name: Set up MSVC x64
        if: matrix.platform_id == 'win_amd64'
        uses: step-security/msvc-dev-cmd@v1

      - name: Install cibuildwheel
        shell: bash
        run: |
          python -m pip install cibuildwheel==4.1.0 setuptools toml

      - name: Get package name and version (Linux / Mac)
        if: ${{ ! startsWith(matrix.os, 'windows-') }}
        run: |
          echo "PACKAGE_NAME=$( python -c "import toml; print(toml.load('pyproject.toml')['project']['name'])" )" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$( python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])" )" >> $GITHUB_ENV

      # Some shells require "-Encoding utf8" to append to GITHUB_ENV
      # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions?tool=powershell#environment-files
      - name: Get package name and version (Windows)
        if: startsWith(matrix.os, 'windows-')
        run: |
          echo "PACKAGE_NAME=$( python -c "import toml; print(toml.load('pyproject.toml')['project']['name'])" )" | Out-File -FilePath $env:GITHUB_ENV ` -Append
          echo "PACKAGE_VERSION=$( python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])" )" | Out-File -FilePath $env:GITHUB_ENV ` -Append

      - name: Determine macOS version
        if: startsWith(matrix.os, 'macos-')
        run: |
          macos_version=$(sw_vers -productVersion | awk -F '.' '{print $1".0"}')
          echo "MACOSX_DEPLOYMENT_TARGET=${macos_version}" >> $GITHUB_ENV

      - name: Set cibuildwheel cache path (macOS / Windows)
        if: ${{ startsWith(matrix.os, 'macos-') || startsWith(matrix.os, 'windows-') }}
        shell: bash
        run: |
          set -euxo pipefail
          cache_dir="${RUNNER_TEMP}/cibw-cache"
          mkdir -p "${cache_dir}"
          echo "CIBW_CACHE_PATH=${cache_dir}" >> "${GITHUB_ENV}"

      - name: Build wheels
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image || env.CIBW_DEFAULT_MANYLINUX_IMAGE }}
          CIBW_BUILD: cp${{ matrix.cibw_python }}-${{ matrix.platform_id }}
          CIBW_TEST_SKIP: "cp*" # We will test during install and test step

          CIBW_BEFORE_ALL_LINUX: |
            echo "Installing system dependencies with yum"
            yum install -y gcc-c++ libpng-devel libpng
            echo "pip installing cmake and ninja"
            python -m pip install cmake ninja setuptools SimpleITK==2.4.1 nibabel

          CIBW_BEFORE_ALL_WINDOWS: |
            python -m pip install cmake ninja setuptools SimpleITK nibabel

          CIBW_ARCHS_MACOS: ${{ matrix.arch }}

          CIBW_ENVIRONMENT_MACOS: |
            CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} CMAKE_PREFIX_PATH=/usr/local

          CIBW_BEFORE_ALL_MACOS: |
            python -m pip install cmake ninja setuptools SimpleITK nibabel
            if ! brew list libpng &>/dev/null; then
                HOMEBREW_NO_AUTO_UPDATE=1 brew install libpng
            fi

        run: python -m cibuildwheel --output-dir wheelhouse/cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}

      - uses: actions/setup-python@v6
        name: Install Python for wheel testing
        with:
          python-version: ${{ matrix.python }}

      - name: Install and test (Linux / Mac)
        if: ${{ ! startsWith(matrix.os, 'windows-') }}
        run: |
          python -m pip install wheelhouse/cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}/*.whl
          tests/run_tests.sh

      - name: Install and test (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: cmd # Use cmd on Windows to avoid bash environment taking priority over MSVC variables
        run: |
          python -m pip install --find-links=./wheelhouse/cp${{ matrix.cibw_python }}-${{ matrix.platform_id }} antspyx
          bash tests/run_tests.sh

      - name: Upload debug artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: debug-${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}-cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}
          path: |
            wheelhouse/**
            ./**/*.log
            ./**/CMakeCache.txt
          if-no-files-found: warn

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}-cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}
          path: ./wheelhouse/cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}/*.whl

      - name: Upload release asset
        # Previously was using actions/upload-release-asset@v1 , but this had some
        # errors with large files
        uses: ncipollo/release-action@v1.21.0
        if: ${{ github.event_name == 'release' }}
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: ./wheelhouse/cp${{ matrix.cibw_python }}-${{ env.WHEEL_SUFFIX }}/*.whl
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish all wheels and sdist to PyPI
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release') }}
    needs:
      - build_wheels
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        name: Install Python host for cibuildwheel
        with:
          python-version: '3.13'
      - uses: actions/download-artifact@v7
        with:
          path: downloaded_artifacts
      - name: Move wheels to dist/ root
        run: |
            mkdir -p dist
            find downloaded_artifacts -type f -name "*.whl" -exec mv {} dist/ \;
      - name: Build sdist
        run: |
            python -m pip install --upgrade build
            python -m build --sdist --outdir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          verify-metadata: true
          skip-existing: true
          attestations: false
          verbose: true
